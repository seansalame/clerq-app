<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0D0D14"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>clerq — בית</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0D0D14;--card:#16161F;--elevated:#1E1E2A;--brd:rgba(255,255,255,.07);--txt:#F0F0F8;--muted:#8A8AA8;--faint:#3A3A5A;--grn:#C6F135;--grn-bg:rgba(198,241,53,.08);--grn-brd:rgba(198,241,53,.2);--red:#FF4757;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Rubik',-apple-system,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased;direction:rtl;}
.app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

.hero{padding:28px 24px 24px;background:linear-gradient(160deg,#1A1A2E 0%,#0D0D14 100%);position:relative;overflow:hidden;}
.horb{position:absolute;width:300px;height:300px;border-radius:50%;top:-120px;left:-80px;background:radial-gradient(circle,rgba(198,241,53,.08),transparent 70%);pointer-events:none;}
.htop{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;position:relative;z-index:1;}
.hg{font-size:14px;color:var(--muted);}
.hn{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-top:3px;}
.hav{width:44px;height:44px;border-radius:50%;background:var(--grn);color:#111;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;border:none;font-family:inherit;}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;position:relative;z-index:1;}
.stat{background:rgba(255,255,255,.05);border:1px solid var(--brd);border-radius:14px;padding:14px 10px;text-align:center;}
.sv{font-size:22px;font-weight:700;color:var(--grn);line-height:1;}
.sl{font-size:11px;color:var(--muted);margin-top:4px;}

.sec{padding:20px 20px 0;}
.slbl{font-size:11px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.ac{background:var(--card);border:1px solid var(--brd);border-radius:20px;padding:18px 16px;cursor:pointer;transition:all .18s ease;display:flex;flex-direction:column;gap:10px;text-decoration:none;color:inherit;}
.ac:active{transform:scale(.97);}
.ac.main{border-color:rgba(198,241,53,.25);background:linear-gradient(135deg,rgba(198,241,53,.08),var(--card));grid-column:1/-1;flex-direction:row;align-items:center;gap:16px;}
.ai{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.ac.main .ai{background:var(--grn);}
.ac:not(.main) .ai{background:var(--elevated);}
.atx{flex:1;}
.atl{font-size:15px;font-weight:600;}
.ads{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.4;}
.arr{font-size:18px;color:var(--faint);}

.rec{padding:20px 20px;flex:1;}
.hi{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--brd);cursor:pointer;}
.hi:active{opacity:.7;}
.hi:last-child{border-bottom:none;}
.hic{width:44px;height:44px;border-radius:12px;background:var(--elevated);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.hin{flex:1;min-width:0;}
.hit{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.his{font-size:12px;color:var(--muted);margin-top:2px;}
.hia{font-size:14px;font-weight:600;color:var(--grn);flex-shrink:0;}

.empty{display:flex;flex-direction:column;align-items:center;padding:40px 20px;text-align:center;gap:10px;}
.ei{font-size:44px;opacity:.2;margin-bottom:6px;}
.et{font-size:16px;font-weight:500;color:var(--muted);}
.es{font-size:13px;color:var(--faint);line-height:1.5;}

.nav{display:flex;background:var(--card);border-top:1px solid var(--brd);padding:10px 0 max(24px,env(safe-area-inset-bottom));position:sticky;bottom:0;z-index:100;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;min-height:44px;padding:6px 0;border:none;background:none;font-family:inherit;font-size:10px;font-weight:500;color:var(--faint);cursor:pointer;transition:color .15s;}
.nb.on{color:var(--grn);}
.ni{font-size:22px;line-height:1;}

.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--elevated);color:var(--txt);padding:12px 24px;border-radius:9999px;font-size:14px;font-weight:500;border:1px solid var(--brd);box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:9999;pointer-events:none;transition:transform .3s ease;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:rgba(198,241,53,.3);color:var(--grn);}
</style>
</head>
<body>

<div class="app">
  <div class="hero">
    <div class="horb"></div>
    <div class="htop">
      <div>
        <div class="hg">שלום,</div>
        <div class="hn" id="hn">...</div>
      </div>
      <button class="hav" id="hav" onclick="goTo('profile.html')">?</button>
    </div>
    <div class="stats">
      <div class="stat"><div class="sv" id="ss">0</div><div class="sl">חשבונות</div></div>
      <div class="stat"><div class="sv" id="st">₪0</div><div class="sl">חולקו</div></div>
      <div class="stat"><div class="sv" id="sf">0</div><div class="sl">חברים</div></div>
    </div>
  </div>

  <div class="sec">
    <div class="slbl">מה תרצה לעשות?</div>
    <div class="grid">
      <div class="ac main" onclick="goTo('scan.html')">
        <div class="ai">🧾</div>
        <div class="atx"><div class="atl">פתח חשבון חדש</div><div class="ads">צלם קבלה — AI יקרא ויפצל תוך שניות</div></div>
        <div class="arr">←</div>
      </div>
      <div class="ac" onclick="goTo('join.html')">
        <div class="ai">🔢</div>
        <div class="atx"><div class="atl">הצטרף</div><div class="ads">הכנס קוד מחבר</div></div>
      </div>
      <div class="ac" onclick="goTo('profile.html')">
        <div class="ai">📋</div>
        <div class="atx"><div class="atl">היסטוריה</div><div class="ads">חשבונות קודמים</div></div>
      </div>
    </div>
  </div>

  <div class="rec">
    <div class="slbl">פעילות אחרונה</div>
    <div id="rlist">
      <div class="empty">
        <div class="ei">🧾</div>
        <div class="et">אין חשבונות עדיין</div>
        <div class="es">לחץ על "פתח חשבון חדש"<br/>וצלם את הקבלה הראשונה שלך</div>
      </div>
    </div>
  </div>

  <nav class="nav">
    <button class="nb on"><span class="ni">🏠</span><span>בית</span></button>
    <button class="nb" onclick="goTo('scan.html')"><span class="ni">📷</span><span>סרוק</span></button>
    <button class="nb" onclick="goTo('join.html')"><span class="ni">🔢</span><span>הצטרף</span></button>
    <button class="nb" onclick="goTo('profile.html')"><span class="ni">👤</span><span>פרופיל</span></button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
// ── Auth guard ──
const user=(function(){try{return JSON.parse(localStorage.getItem('clerq_u'));}catch{return null;}})();
if(!user){
  const p=window.location.pathname;
  const base=p.substring(0,p.lastIndexOf('/')+1);
  window.location.href=base+'index.html';
}

// ── Dynamic path helper ──
function goTo(page){
  const p=window.location.pathname;
  const base=p.substring(0,p.lastIndexOf('/')+1);
  window.location.href=base+page;
}

// ── Firebase ──
if(!firebase.apps.length){
  firebase.initializeApp({
    apiKey:"AIzaSyBWYEntIaNdQio86BGVREmBAAqUo0F6sIw",
    authDomain:"clerq-1145a.firebaseapp.com",
    databaseURL:"https://clerq-1145a-default-rtdb.firebaseio.com",
    projectId:"clerq-1145a",
    storageBucket:"clerq-1145a.firebasestorage.app",
    messagingSenderId:"426819964309",
    appId:"1:426819964309:web:adf96da249d35d5d823a9c"
  });
}
const db=firebase.database();

// ── Render ──
if(user){
  const init=(user.name||'מ')[0].toUpperCase();
  document.getElementById('hn').textContent=user.name+' 👋';
  document.getElementById('hav').textContent=init;

  db.ref('users/'+user.id+'/stats').on('value',snap=>{
    const s=snap.val()||{};
    document.getElementById('ss').textContent=s.sessions||0;
    document.getElementById('st').textContent=s.total?'₪'+Math.round(s.total):'₪0';
    document.getElementById('sf').textContent=s.friends||0;
  });

  db.ref('userSessions/'+user.id).once('value').then(snap=>{
    const data=snap.val();
    if(!data)return;
    const sessions=Object.values(data).sort((a,b)=>(b.created||0)-(a.created||0)).slice(0,5);
    if(!sessions.length)return;
    const list=document.getElementById('rlist');
    list.innerHTML='';
    sessions.forEach(s=>{
      const el=document.createElement('div');
      el.className='hi';
      el.onclick=()=>goTo('session.html?id='+s.sessionId);
      const d=new Date(s.created).toLocaleDateString('he-IL');
      el.innerHTML=`<div class="hic">🧾</div><div class="hin"><div class="hit">${esc(s.restaurantName||'חשבון')}</div><div class="his">${d} · ${s.members||1} משתתפים</div></div><div class="hia">₪${Math.round(s.myTotal||0)}</div>`;
      list.appendChild(el);
    });
  }).catch(()=>{});
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

let _tm;
function toast(m,t){const el=document.getElementById('toast');el.textContent=m;el.className='toast show'+(t?' '+t:'');clearTimeout(_tm);_tm=setTimeout(()=>el.classList.remove('show'),3000);}
</script>
</body>
</html>
