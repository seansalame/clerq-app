<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="theme-color" content="#0D0D14"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>clerq — בית</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap"/>
<link rel="stylesheet" href="./design.css"/>
<style>

  /* ── Hero ── */
  .hero {
    padding: 28px 24px 28px;
    background: linear-gradient(160deg, #1A1A2E 0%, #0D0D14 100%);
    position: relative; overflow: hidden;
  }

  .hero-orb {
    position: absolute; width: 300px; height: 300px;
    border-radius: 50%; top: -120px; left: -80px;
    background: radial-gradient(circle, rgba(198,241,53,0.08), transparent 70%);
    pointer-events: none;
  }

  .hero-top {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 20px;
    position: relative; z-index: 1;
  }

  .hero-greeting { font-size: 14px; color: var(--color-text-secondary); }
  .hero-name { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; margin-top: 2px; }

  .hero-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--color-brand); color: #111;
    font-size: 18px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
  }

  .hero-stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px; position: relative; z-index: 1;
  }

  .stat-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    padding: 14px 10px; text-align: center;
  }

  .stat-val {
    font-size: 22px; font-weight: 700;
    color: var(--color-brand); line-height: 1;
  }

  .stat-lbl {
    font-size: 11px; color: var(--color-text-secondary);
    margin-top: 4px;
  }

  /* ── Actions ── */
  .actions-section { padding: 24px 20px 0; }

  .section-lbl {
    font-size: 11px; font-weight: 600;
    color: var(--color-text-tertiary);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 14px;
  }

  .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .action-card {
    background: var(--color-bg-card);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 18px 16px; cursor: pointer;
    transition: all 0.18s ease;
    display: flex; flex-direction: column; gap: 12px;
    text-decoration: none;
  }

  .action-card:active { transform: scale(0.97); }

  .action-card.primary {
    border-color: rgba(198,241,53,0.25);
    background: linear-gradient(135deg, rgba(198,241,53,0.08), var(--color-bg-card));
    grid-column: 1 / -1;
    flex-direction: row; align-items: center; gap: 16px;
  }

  .action-icon {
    width: 48px; height: 48px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
  }

  .action-card.primary .action-icon { background: var(--color-brand); }
  .action-card:not(.primary) .action-icon { background: var(--color-bg-elevated); }

  .action-text { flex: 1; }
  .action-title { font-size: 15px; font-weight: 600; }
  .action-desc  { font-size: 12px; color: var(--color-text-secondary); margin-top: 3px; line-height: 1.4; }
  .action-arrow { font-size: 18px; color: var(--color-text-tertiary); }

  /* ── Recent ── */
  .recent-section { padding: 24px 20px; flex: 1; }

  .history-item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 0; border-bottom: 1px solid var(--color-border);
    cursor: pointer; transition: opacity 0.15s;
  }
  .history-item:active { opacity: 0.7; }
  .history-item:last-child { border-bottom: none; }

  .history-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: var(--color-bg-elevated);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }

  .history-info { flex: 1; min-width: 0; }
  .history-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history-sub   { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
  .history-amt   { font-size: 14px; font-weight: 600; color: var(--color-brand); flex-shrink: 0; }

  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 20px; text-align: center; gap: 10px;
  }

  .empty-icon  { font-size: 44px; opacity: 0.2; margin-bottom: 6px; }
  .empty-title { font-size: 16px; font-weight: 500; color: var(--color-text-secondary); }
  .empty-sub   { font-size: 13px; color: var(--color-text-tertiary); line-height: 1.5; }

  /* ── Nav ── */
  .bottom-nav {
    display: flex; background: var(--color-bg-card);
    border-top: 1px solid var(--color-border);
    padding: 10px 0 max(24px, env(safe-area-inset-bottom));
    position: sticky; bottom: 0; z-index: 100;
  }

  .nav-btn {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 3px;
    min-height: 44px; padding: 6px 0;
    border: none; background: none;
    font-family: inherit; font-size: 10px; font-weight: 500;
    color: var(--color-text-tertiary); cursor: pointer;
    transition: color 0.15s;
  }

  .nav-btn.active { color: var(--color-brand); }
  .nav-btn-icon { font-size: 22px; line-height: 1; }
</style>
</head>
<body>
<div class="app-shell">

  <!-- Hero -->
  <div class="hero">
    <div class="hero-orb" aria-hidden="true"></div>
    <div class="hero-top">
      <div>
        <div class="hero-greeting">שלום,</div>
        <div class="hero-name" id="hero-name">
          <div class="skeleton" style="width:120px;height:28px;border-radius:8px"></div>
        </div>
      </div>
      <div class="hero-avatar" id="hero-avatar" onclick="window.location='./profile.html'" aria-label="פרופיל">?</div>
    </div>

    <div class="hero-stats">
      <div class="stat-card">
        <div class="stat-val" id="stat-sessions">—</div>
        <div class="stat-lbl">חשבונות</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-total">—</div>
        <div class="stat-lbl">חולקו</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-friends">—</div>
        <div class="stat-lbl">חברים</div>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="actions-section">
    <div class="section-lbl">מה תרצה לעשות?</div>
    <div class="action-grid">

      <a class="action-card primary" href="./scan.html" aria-label="פתח חשבון חדש">
        <div class="action-icon">🧾</div>
        <div class="action-text">
          <div class="action-title">פתח חשבון חדש</div>
          <div class="action-desc">צלם קבלה — AI יקרא ויפצל תוך שניות</div>
        </div>
        <div class="action-arrow">←</div>
      </a>

      <a class="action-card" href="./join.html" aria-label="הצטרף לחשבון">
        <div class="action-icon">🔢</div>
        <div class="action-text">
          <div class="action-title">הצטרף</div>
          <div class="action-desc">הכנס קוד מחבר</div>
        </div>
      </a>

      <a class="action-card" href="./profile.html" aria-label="פרופיל והיסטוריה">
        <div class="action-icon">📋</div>
        <div class="action-text">
          <div class="action-title">היסטוריה</div>
          <div class="action-desc">חשבונות קודמים</div>
        </div>
      </a>

    </div>
  </div>

  <!-- Recent -->
  <div class="recent-section">
    <div class="section-lbl">פעילות אחרונה</div>
    <div id="recent-list">
      <div class="empty-state">
        <div class="empty-icon">🧾</div>
        <div class="empty-title">אין חשבונות עדיין</div>
        <div class="empty-sub">פתח חשבון ראשון<br/>לחץ על "פתח חשבון חדש" למעלה</div>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav" aria-label="ניווט ראשי">
    <button class="nav-btn active" aria-label="בית" aria-current="page">
      <span class="nav-btn-icon" aria-hidden="true">🏠</span>
      <span>בית</span>
    </button>
    <button class="nav-btn" onclick="window.location='./scan.html'" aria-label="סרוק קבלה">
      <span class="nav-btn-icon" aria-hidden="true">📷</span>
      <span>סרוק</span>
    </button>
    <button class="nav-btn" onclick="window.location='./join.html'" aria-label="הצטרף לחשבון">
      <span class="nav-btn-icon" aria-hidden="true">🔢</span>
      <span>הצטרף</span>
    </button>
    <button class="nav-btn" onclick="window.location='./profile.html'" aria-label="פרופיל">
      <span class="nav-btn-icon" aria-hidden="true">👤</span>
      <span>פרופיל</span>
    </button>
  </nav>

</div>

<div id="clerq-toast" class="toast" role="status" aria-live="polite"></div>

<script type="module">
import {
  db, ref, onValue,
  getUser, requireAuth,
  navigate, ROUTES,
  showToast, registerSW,
  formatCurrency, formatDateShort,
  track
} from './core.js';

// ── Auth Guard ──
const user = requireAuth();
if (!user) throw new Error('Redirecting to login');

// ── Register SW ──
registerSW();

// ── Render user ──
const initial = (user.name || 'מ')[0].toUpperCase();
document.getElementById('hero-name').textContent = user.name + ' 👋';
document.getElementById('hero-avatar').textContent = initial;

track('home_view', { userId: user.id });

// ── Load stats ──
const statsRef = ref(db, `users/${user.id}/stats`);
onValue(statsRef, snap => {
  const s = snap.val() || {};
  document.getElementById('stat-sessions').textContent = s.sessions || 0;
  document.getElementById('stat-total').textContent    = s.total ? '₪' + Math.round(s.total) : '₪0';
  document.getElementById('stat-friends').textContent  = s.friends || 0;
}, { onlyOnce: false });

// ── Load recent sessions ──
const sessionsRef = ref(db, `userSessions/${user.id}`);
onValue(sessionsRef, snap => {
  const data = snap.val();
  if (!data) return;

  const sessions = Object.values(data)
    .sort((a, b) => (b.created || 0) - (a.created || 0))
    .slice(0, 5);

  if (!sessions.length) return;

  const list = document.getElementById('recent-list');
  list.innerHTML = '';

  sessions.forEach(s => {
    const item = document.createElement('div');
    item.className = 'history-item';
    item.setAttribute('role', 'button');
    item.setAttribute('tabindex', '0');
    item.setAttribute('aria-label', `חשבון מ-${formatDateShort(s.created)}`);

    item.onclick = () => navigate('./session.html', { id: s.sessionId });
    item.onkeydown = e => { if (e.key === 'Enter') item.click(); };

    item.innerHTML = `
      <div class="history-icon" aria-hidden="true">🧾</div>
      <div class="history-info">
        <div class="history-title">${s.restaurantName || 'חשבון'}</div>
        <div class="history-sub">${formatDateShort(s.created)} · ${s.members || 1} משתתפים</div>
      </div>
      <div class="history-amt">${formatCurrency(s.myTotal || 0)}</div>
    `;

    list.appendChild(item);
  });
}, { onlyOnce: true });
</script>
</body>
</html>
